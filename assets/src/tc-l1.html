<!DOCTYPE html>
<meta charset="utf-8">
<title>TC L1 — grand hall, 4x master generator</title>
<!-- Generator for assets/tc-l1.png: Town Center L1 as a GRAND HALL on a
     2×2-tile footprint, painted per-pixel at 256×256 (4× the in-engine 64×64
     slot; the pipeline downscales at decode). Deterministic. ARTSTYLE.md
     applies: palette ramps only, top-left light, 1px darkest-ramp outlines,
     soft baked contact shadow. Composition (per the approved reference): one
     dominant hall — a two-tier hipped thatch roof with a raised cap, timber
     walls braced by stone corner pillars, an arched doorway under a small
     awning, pennant flags at the front corners — with the campfire burning
     in the dooryard (engine smoke/flame anchor: 0.78, 1.64 in tile units). -->
<canvas id="c" width="256" height="256"></canvas>
<script>
'use strict';
/* master palette ramps — mirror of ART.PALETTE (artstyle.js) */
const P = {
  thatch: ['#7a6224', '#ab8c38', '#c9a84c', '#e0c065'],
  wood:   ['#3e2c14', '#5c421f', '#6e5024', '#8a6b3a', '#a5854d'],
  soil:   ['#3c2c16', '#57431f', '#6b5433', '#82683f'],
  stone:  ['#4a4a44', '#6f6f66', '#8f8f86', '#adada2', '#c9c9bf'],
  fire:   ['#a33f1c', '#e88a3a', '#f2c14a', '#ffe9a0'],
  hide:   ['#41291a', '#5c3c20', '#7a5230', '#9c7040'],
  ink:    ['#14100a', '#241d15', '#3a3324'],
};
const W = 256, H = 256;
const rgb = {};
for (const k in P) rgb[k] = P[k].map(h => [1, 3, 5].map(i => parseInt(h.slice(i, i + 2), 16)));

const px = new Uint8ClampedArray(W * H * 4);
const mask = new Uint8Array(W * H);
function put(x, y, c, structural, a) {
  x |= 0; y |= 0;
  if (x < 0 || y < 0 || x >= W || y >= H) return;
  const i = (y * W + x) * 4;
  px[i] = c[0]; px[i + 1] = c[1]; px[i + 2] = c[2]; px[i + 3] = a === undefined ? 255 : a;
  mask[y * W + x] = structural ? 1 : (mask[y * W + x] === 1 ? 1 : 0);
}
let seed = 2049;
const rnd = () => (seed = (seed * 16807 + 11) % 2147483647) / 2147483647;

function shadow(cx, cy, rx, ry, strength) {
  for (let y = cy - ry; y <= cy + ry; y++) for (let x = cx - rx; x <= cx + rx; x++) {
    const d = ((x - cx) / rx) ** 2 + ((y - cy) / ry) ** 2;
    if (d < 1) {
      const i = ((y | 0) * W + (x | 0)) * 4;
      if (px[i + 3] < 140)
        put(x, y, rgb.ink[0], false, Math.max(px[i + 3], Math.round((strength || 80) * (1 - d))));
    }
  }
}
function earth(cx, cy, rx, ry, litBias) {
  for (let y = cy - ry; y <= cy + ry; y++) for (let x = cx - rx; x <= cx + rx; x++) {
    const d = ((x - cx) / rx) ** 2 + ((y - cy) / ry) ** 2;
    if (d > 1 || rnd() < d * d * 0.9) continue;
    const t = rnd();
    put(x, y, rgb.soil[t < (0.4 + (litBias || 0)) ? 3 : t < 0.82 ? 2 : 1], false);
  }
}
/* a thatch plane: trapezoid between a top edge and a wider bottom edge, with
   diagonal hip seams, layered courses, comb streaks and top-left light */
function thatchPlane(topX0, topX1, topY, botX0, botX1, botY, courseH) {
  const comb = Array.from({ length: 16 }, () => rnd());
  for (let y = topY; y <= botY; y++) {
    const v = (y - topY) / (botY - topY);
    const x0 = topX0 + (botX0 - topX0) * v, x1 = topX1 + (botX1 - topX1) * v;
    for (let x = Math.round(x0); x <= Math.round(x1); x++) {
      const u = (x - x0) / Math.max(1, x1 - x0);
      /* hip zones: outside the top edge's span reads as the side slopes */
      const hipL = x < topX0 + (x0 - topX0) * 0 + (topX0 - x0) * 0 && false;
      let light = 3.5 - u * 1.7 - v * 1.15 + (rnd() - 0.5) * 0.7;
      if (x < topX0) light += Math.max(0, 0.4 - (topX0 - x) * 0.008);   // left hip catches sun
      if (x > topX1) light -= Math.min(0.7, (x - topX1) * 0.016);        // right hip shades off gently
      let step = Math.max(0, Math.min(3, Math.round(light)));
      if (((y - topY) % courseH) >= courseH - 1 && rnd() < 0.75) step = Math.max(0, step - 1);
      for (let k = 0; k < comb.length; k++)
        if (Math.abs(u - comb[k]) < 0.005) { step = Math.max(0, step - 1); break; }
      put(x, y, rgb.thatch[step], true);
    }
    /* dark hip seams from the top corners down to the bottom corners */
    const sL = topX0 + (botX0 - topX0) * v, sR = topX1 + (botX1 - topX1) * v;
    put(sL, y, rgb.thatch[0], true);
    put(sR, y, rgb.thatch[0], true);
  }
  /* ragged eave fringe */
  for (let x = botX0; x <= botX1; x += 1 + (rnd() * 3 | 0)) {
    const drop = 1 + (rnd() * 2 | 0);
    for (let d = 1; d <= drop; d++) put(x, botY + d, rgb.thatch[rnd() < 0.5 ? 0 : 1], true);
  }
}
function pennant(pxx, top, bot, dir) {
  for (let y = top; y <= bot; y++) {                     // the pole
    put(pxx, y, rgb.wood[1], true); put(pxx + 1, y, rgb.wood[3], true);
  }
  put(pxx, top - 1, rgb.wood[4], true);
  for (let i = 0; i < 14; i++) {                         // triangular flame-orange pennant
    const len = Math.round((1 - i / 14) * 16);
    const wave = Math.round(Math.sin(i * 0.7) * 1.2);
    for (let k = 2; k <= len; k++)
      put(pxx + dir * k, top + 1 + i + wave, rgb.fire[k > len - 3 ? 1 : (i < 4 ? 2 : 1)], true);
    if (len > 2) put(pxx + dir * len, top + 1 + i + wave, rgb.fire[0], true);
  }
}
function pot(cx, cy) {
  for (let y = -3; y <= 3; y++) for (let x = -3; x <= 3; x++) {
    if (x * x + y * y > 10) continue;
    put(cx + x, cy + y, rgb.soil[x < 0 && y < 0 ? 3 : 2], true);
  }
  put(cx - 1, cy - 4, rgb.soil[1], true); put(cx, cy - 4, rgb.ink[1], true); put(cx + 1, cy - 4, rgb.soil[1], true);
}

/* ================= the ground: packed earth + walked threshold ================= */
shadow(129, 188, 100, 13, 62);         // under everything — the earth covers most of it
earth(128, 198, 100, 42, 0.05);
earth(100, 214, 42, 24, 0.1);          // brightest by the fire
for (let i = 0; i < 40; i++) {         // worn path door → fire
  const t = i / 40;
  put(128 - t * 26 + (rnd() * 6 - 3), 190 + t * 18 + (rnd() * 4 - 2), rgb.soil[3], false);
}

/* ================= the hall ================= */
const WX0 = 34, WX1 = 222, WTOP = 118, WBOT = 184;   // wall band

/* --- main hip roof: wide trapezoid, ridge high and narrow --- */
thatchPlane(92, 164, 48, 20, 236, 118, 12);
/* --- upper storey: a short wall band riding the ridge, then its own cap roof --- */
for (let y = 34; y <= 47; y++) for (let x = 96; x <= 160; x++) {
  const u = (x - 96) / 64;
  let c = rgb.wood[u < 0.3 ? 3 : u < 0.75 ? 2 : 1];
  if ((x - 96) % 10 < 1) c = rgb.wood[1];             // plank seams
  put(x, y, c, true);
}
for (const wx of [112, 140]) {                        // smoke vents up top
  for (let y = 38; y <= 44; y++) for (let x = wx; x <= wx + 6; x++) put(x, y, rgb.ink[0], true);
  for (let x = wx - 1; x <= wx + 7; x++) put(x, 37, rgb.wood[4], true);
}
thatchPlane(116, 140, 8, 88, 168, 34, 9);             // the cap roof
/* ridge caps: bound reed bundles with lashings */
for (let x = 92; x <= 164; x++) {                     // main ridge
  put(x, 47, rgb.thatch[3], true); put(x, 48, rgb.thatch[1], true);
}
for (let x = 116; x <= 140; x++) {                    // cap ridge
  put(x, 7, rgb.thatch[3], true); put(x, 8, rgb.thatch[1], true);
  if (x % 8 < 2) put(x, 7, rgb.wood[1], true);
}
/* crossed finials on the cap */
for (let i = 0; i < 7; i++) {
  put(124 + i, 0 + i, rgb.wood[2], true); put(125 + i, 0 + i, rgb.wood[4], true);
  put(132 - i, 0 + i, rgb.wood[1], true); put(131 - i, 0 + i, rgb.wood[2], true);
}

/* --- walls: timber planks between stone corner pillars --- */
for (let y = WTOP + 1; y <= WBOT; y++) for (let x = WX0; x <= WX1; x++) {
  const u = (x - WX0) / (WX1 - WX0);
  let c = rgb.wood[u < 0.28 ? 3 : u < 0.72 ? 2 : 1];
  if (rnd() < 0.06) c = rgb.wood[u < 0.5 ? 2 : 0];    // grain flecks
  if (y <= WTOP + 4) c = rgb.ink[2];                  // deep eave shadow
  put(x, y, c, true);
}
for (const sx of [66, 96, 160, 190]) {                // wall studs, lit left edge
  for (let y = WTOP + 4; y <= WBOT; y++) {
    put(sx, y, rgb.wood[1], true);
    put(sx + 1, y, rgb.wood[y % 3 === 0 ? 4 : 3], true);
  }
}
/* horizontal plank lines */
for (const wy of [140, 158, 174]) for (let x = WX0 + 2; x <= WX1 - 2; x++)
  if (rnd() < 0.8) put(x, wy, rgb.wood[1], true);
/* stone corner pillars — chunky, blockwork, lit on the left faces */
for (const [px0, litSide] of [[WX0 - 8, 1], [WX1 - 6, 0]]) {
  for (let y = WTOP - 6; y <= WBOT + 2; y++) for (let x = px0; x <= px0 + 14; x++) {
    const row = ((y - WTOP) / 8 | 0), gap = ((x - px0 + (row % 2) * 4) % 8) === 0 || (y - WTOP + 6) % 8 === 0;
    let c = gap ? rgb.ink[2] : rgb.stone[litSide ? (x < px0 + 5 ? 3 : 2) : (x < px0 + 8 ? 2 : 1)];
    if (!gap && y === WTOP - 6) c = rgb.stone[3];
    put(x, y, c, true);
  }
}

/* --- arched doorway, timber frame, thatch awning over it --- */
for (let x = 112; x <= 144; x++) {
  const dx = Math.abs(x - 128);
  const top = 146 + Math.round(dx * dx * 0.014);      // shallow arch
  for (let y = top; y <= WBOT; y++) put(x, y, rgb.ink[y < top + 10 ? 0 : 1], true);
}
for (let y = 144; y <= WBOT; y++) {                   // door posts
  put(109, y, rgb.wood[2], true); put(110, y, rgb.wood[4], true);
  put(146, y, rgb.wood[2], true); put(147, y, rgb.wood[1], true);
}
for (let x = 106; x <= 150; x++) { put(x, 142, rgb.wood[3], true); put(x, 143, rgb.wood[2], true); }
thatchPlane(112, 144, 128, 102, 154, 141, 8);         // little awning roof
for (let x = 116; x <= 140; x++) put(x, WBOT + 1, rgb.soil[3], false);   // worn sill

/* --- pennant flags at the front corners, rising past the eaves --- */
pennant(WX0 - 4, 76, WTOP - 4, -1);
pennant(WX1 + 8, 72, WTOP - 8, 1);

/* ================= the dooryard: campfire (engine anchor 0.78, 1.64) ================= */
const FX = 100, FY = 210;
for (let y = FY - 5; y <= FY + 5; y++) for (let x = FX - 9; x <= FX + 9; x++)
  if (((x - FX) / 9.4) ** 2 + ((y - FY) / 5.6) ** 2 < 1)
    put(x, y, rnd() < 0.3 ? rgb.ink[1] : rgb.ink[0], true);
for (let a = 0; a < 12; a++) {
  const ang = (a / 12) * Math.PI * 2 + 0.3;
  const sx = Math.round(FX + Math.cos(ang) * 10.5), sy = Math.round(FY + Math.sin(ang) * 6.4);
  const back = sy < FY;
  put(sx, sy, rgb.stone[back ? 1 : 2], true); put(sx + 1, sy, rgb.stone[back ? 1 : 2], true);
  put(sx, sy - 1, rgb.stone[back ? 2 : 3], true);
  if (!back) put(sx + 1, sy + 1, rgb.stone[0], true);
  if (sy >= FY - 2) put(sx + (sx < FX ? 2 : -2), sy, rgb.fire[0], true);
}
put(FX - 1, FY, rgb.fire[2], true); put(FX, FY, rgb.fire[2], true);
put(FX, FY - 1, rgb.fire[3], true); put(FX + 1, FY, rgb.fire[1], true);
put(FX - 2, FY + 1, rgb.fire[0], true); put(FX + 2, FY + 1, rgb.fire[0], true);
/* a log bench and pots complete the yard */
for (let i = 0; i < 24; i++) {
  put(146 + i, 213 - (i * 0.06 | 0), rgb.wood[3], true);
  put(146 + i, 214, rgb.wood[2], true);
  put(146 + i, 215, rgb.wood[1], true);
}
put(146, 213, rgb.wood[4], true); put(169, 213, rgb.wood[1], true);
pot(160, 194); pot(92, 190);

/* ================= outline pass: darkest ramp shade, never black ================= */
const isStruct = (x, y) => x >= 0 && y >= 0 && x < W && y < H &&
  mask[y * W + x] === 1 && px[(y * W + x) * 4 + 3] > 200;
const edges = [];
for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
  if (isStruct(x, y)) continue;
  const n = [[1, 0], [-1, 0], [0, 1], [0, -1]].find(([dx, dy]) => isStruct(x + dx, y + dy));
  if (!n) continue;
  const i = ((y + n[1]) * W + (x + n[0])) * 4;
  edges.push([x, y, [px[i] * 0.38 + 8, px[i + 1] * 0.38 + 6, px[i + 2] * 0.38 + 4]]);
}
for (const [x, y, c] of edges) put(x, y, c, false);

const g = document.getElementById('c').getContext('2d');
const img = g.createImageData(W, H);
img.data.set(px);
g.putImageData(img, 0, 0);
window.PNG = document.getElementById('c').toDataURL('image/png');
</script>
